<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Ruang Edukasi</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #030712;
            color: white;
            overflow: hidden;
        }

        .card-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }

        .animate-blob {
            animation: blob 7s infinite;
        }

        @keyframes blob {
            0% {
                transform: translate(0px, 0px) scale(1);
            }

            33% {
                transform: translate(30px, -50px) scale(1.1);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }

            100% {
                transform: translate(0px, 0px) scale(1);
            }
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6 relative">
    <!-- Animated Background -->
    <div
        class="absolute top-0 -left-4 w-72 h-72 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob">
    </div>
    <div
        class="absolute top-0 -right-4 w-72 h-72 bg-indigo-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-2000">
    </div>
    <div
        class="absolute -bottom-8 left-20 w-72 h-72 bg-pink-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-4000">
    </div>

    <div class="w-full max-w-md relative z-10 slide-in">
        <div class="text-center mb-10">
            <div
                class="inline-block w-16 h-16 rounded-2xl bg-indigo-500 flex items-center justify-center text-3xl shadow-xl shadow-indigo-500/20 mb-6 mx-auto">
                🎓</div>
            <h1 class="text-3xl font-black tracking-tight mb-2">Selamat <span class="text-indigo-400">Datang</span></h1>
            <p class="text-gray-400">Silakan login untuk memulai perjalanan belajarmu</p>
        </div>

        <div class="card-glass rounded-[2rem] p-8 sm:p-10 shadow-2xl">
            <div id="alert-error"
                class="hidden mb-6 p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm font-medium">
                Username atau password salah!
            </div>

            <form id="login-form">
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-400 mb-2 ml-1">Username</label>
                        <input type="text" id="username" required
                            class="w-full px-5 py-4 rounded-xl bg-white/5 border border-white/10 focus:border-indigo-500 focus:bg-white/10 outline-none transition text-sm"
                            placeholder="Masukkan username">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-400 mb-2 ml-1">Password</label>
                        <input type="password" id="password" required
                            class="w-full px-5 py-4 rounded-xl bg-white/5 border border-white/10 focus:border-indigo-500 focus:bg-white/10 outline-none transition text-sm"
                            placeholder="Masukkan password">
                    </div>
                    <button type="submit"
                        class="btn-primary w-full py-4 rounded-xl font-bold text-white shadow-xl shadow-indigo-500/20 hover:scale-[1.02] active:scale-[0.98] transition mt-4">
                        Masuk Sekarang
                    </button>
                    <p class="text-center text-xs text-gray-500 pt-4">© 2026 Ruang Edukasi - Generasi Bangsa</p>
                </div>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
